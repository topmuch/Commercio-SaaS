<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10B981" />
  <title>Hors-ligne — Teranga Biz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #F8FAFC;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.1);
      border: 2px solid rgba(16, 185, 129, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon-circle svg {
      width: 48px;
      height: 48px;
      stroke: #10B981;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #F8FAFC;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #94A3B8;
      margin-bottom: 8px;
    }
    .sync-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid rgba(234, 179, 8, 0.2);
      border-radius: 12px;
      font-size: 13px;
      color: #FBBF24;
    }
    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FBBF24;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
      padding: 14px 32px;
      background: #10B981;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      min-height: 48px;
    }
    .retry-btn:hover { background: #059669; }
    .retry-btn:active { background: #047857; }
    .retry-btn svg {
      width: 20px;
      height: 20px;
    }
    .logo-text {
      font-size: 14px;
      color: #64748B;
      margin-top: 48px;
    }
    .logo-text span { color: #10B981; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-circle">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
      </svg>
      <line x1="12" y1="2" x2="12" y2="10" stroke="#EF4444" stroke-width="3" stroke-linecap="round"
        style="position: absolute; transform: rotate(45deg); transform-origin: 12px 6px;" />
    </div>
    <h1>Vous êtes hors-ligne</h1>
    <p>La connexion internet est indisponible.</p>
    <p>Vérifiez votre connexion et réessayez.</p>
    <div class="sync-note">
      <div class="sync-dot"></div>
      Vos données seront synchronisées automatiquement
    </div>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
      </svg>
      Réessayer
    </button>
    <div class="logo-text">Propulsé par <span>Teranga Biz</span></div>
  </div>
</body>
</html>
